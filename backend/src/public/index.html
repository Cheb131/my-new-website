<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tam Quốc Sát</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚔️ TAM QUỐC SÁT ⚔️</h1>
        
        <!-- NÚT BẤM CHUYỂN QUA TRANG TRA CỨU BÀI -->
        <a href="/deck" class="filter-btn" style="text-decoration: none; display: inline-block; margin-bottom: 20px; border-color: #ffcc00; color: #ffcc00; font-weight: bold; padding: 10px 20px;">
            📚 Xem Danh Sách Bài Đánh ➔
        </a>
        
        <div class="card-container" id="result"></div>

        <div class="selected-panel">
            <div id="selectedList" class="selected-list">
                <div class="empty-msg">Chưa có kỹ năng nào được chọn. Hãy nhấn vào ô phía trên.</div>
            </div>
        </div>

        <div class="choices-panel" id="choicesPanel">
            <div class="choices-title">🔮 Chọn 1 kỹ năng để lĩnh hội 🔮</div>
            <div id="choicesList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
